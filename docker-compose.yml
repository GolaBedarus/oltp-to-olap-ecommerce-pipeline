version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: olist_postgres
    environment:
      POSTGRES_DB: olist
      POSTGRES_USER: olist_user
      POSTGRES_PASSWORD: olist_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: